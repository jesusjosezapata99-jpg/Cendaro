name: Sync development with main

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check for differences
        id: diff
        run: |
          git fetch origin development
          DIFF=$(git diff origin/main..origin/development --stat)
          if [ -z "$DIFF" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Create sync branch and PR
        if: steps.diff.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SYNC_BRANCH="sync/main-to-development-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$SYNC_BRANCH" origin/development
          git merge origin/main --no-edit
          git push origin "$SYNC_BRANCH"

          # Create PR (will be auto-merged if no conflicts)
          gh pr create \
            --base development \
            --head "$SYNC_BRANCH" \
            --title "sync: merge main into development" \
            --body "Automated sync from \`main\` → \`development\`.\n\nTriggered by push to main." \
            --label "sync"
