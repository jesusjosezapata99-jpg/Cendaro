name: Sync web_design with development

on:
  push:
    branches:
      - development

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check for differences
        id: diff
        run: |
          git fetch origin web_design
          DIFF=$(git diff origin/development..origin/web_design --stat)
          if [ -z "$DIFF" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Create sync branch and PR
        if: steps.diff.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SYNC_BRANCH="sync/development-to-web_design-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$SYNC_BRANCH" origin/web_design
          git merge origin/development --no-edit
          git push origin "$SYNC_BRANCH"

          # Create PR (will be auto-merged if no conflicts)
          gh pr create \
            --base web_design \
            --head "$SYNC_BRANCH" \
            --title "sync: merge development into web_design" \
            --body "Automated sync from \`development\` → \`web_design\`.\n\nTriggered by push to development." \
            --label "sync"
