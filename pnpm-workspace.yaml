packages:
  - apps/*
  - packages/*
  - tooling/*

catalog:
  "@eslint/js": ^9.27.0
  "@tailwindcss/postcss": ^4.2.1
  "@tailwindcss/vite": ^4.2.1
  "@tanstack/react-query": ^5.90.21
  "@trpc/client": ^11.12.0
  "@trpc/server": ^11.12.0
  "@trpc/tanstack-react-query": ^11.12.0
  "@types/node": ^25.5.0
  drizzle-kit: ^0.31.9
  drizzle-orm: ^0.45.1
  eslint: ^9.39.4
  prettier: ^3.8.1
  tailwindcss: ^4.2.1
  typescript: ^5.9.3
  zod: ^4.3.6

catalogs:
  react19:
    "@types/react": ~19.1.0
    "@types/react-dom": ~19.1.0
    react: 19.1.4
    react-dom: 19.1.4

linkWorkspacePackages: true

onlyBuiltDependencies:
  - "@tailwindcss/oxide"
  - core-js-pure
  - esbuild
  - sharp

overrides:
  "@types/minimatch": 5.1.2
  lightningcss: 1.30.1

publicHoistPattern:
  - "@ianvs/prettier-plugin-sort-imports"
  - prettier-plugin-tailwindcss
